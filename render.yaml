services:
  - type: web
    name: d2d-spirit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python intake_server.py
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: MAKE_INTAKE_WEBHOOK_URL
        sync: false
      - key: MAKE_PAYMENT_WEBHOOK_URL
        sync: false
